function encryptMultiplyer(text, layers) {
  if (layers > 10) {
    throw new ReferenceError("Cannot encrypt string with more than 10 layers");
  }
  let resultText = text;
  for (let i = 0; i < layers; i++) {
    if (resultText.length > 400) return console.warn("Warning: Encrypting a string too high can deny system processes, and overwhelm your browser/PC. If you wish to continue and ignore this warning, please change the overEncryptStrings variable to true.")
    resultText = btoa(resultText).replace(/(\=)/gi, "");
  }
  return resultText;
}
function decryptMultiplyer(text, layers) {
  if (layers > 10) {
    throw new ReferenceError("Cannot decrypt string with more than 10 layers");
  }
  let resultText = text;
  for (let i = 0; i < layers; i++) {
    if (!atob(resultText)) {
      throw new ReferenceError("Failed to decrypt string on layer " + (10 -i) + " (OverDecrypt Failure)");
    }
    resultText = atob(resultText);
  }
  return resultText;
}
function _get(url, method, callback, params = null) {
  var obj;
  try {   
   obj = new XMLHttpRequest();  
  } catch(e){   
    try {
      obj = new ActiveXObject("Msxml2.XMLHTTP");
    } catch(e) {
      try {
        obj = new ActiveXObject("Microsoft.XMLHTTP");
      } catch(e) {
        return false;
      }
    }
  }
  obj.onreadystatechange = function() {
    if (obj.readyState == 4) {
       callback(obj);
    }
  }
  obj.open(method, url, true);
  obj.send(params);
  return obj; 
}
